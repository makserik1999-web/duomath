services:
  postgres:
    image: postgres:16
    container_name: mvp_postgres
    environment:
      POSTGRES_USER: mvp_user
      POSTGRES_PASSWORD: mvp_password
      POSTGRES_DB: mvp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed_math.sql:/docker-entrypoint-initdb.d/02_seed_math.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvp_user -d mvp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
